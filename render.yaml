services:
  # Backend API
  - type: web
    name: cerebro-path-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromConfigVar: MONGODB_URI
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Set this in Render Dashboard

  # Frontend Static Site
  - type: static
    name: cerebro-path-ui
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: cerebro-path-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
